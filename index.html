<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fake Playable Builder</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="builder/style.css" />
</head>
<body>
  <main class="container">
    <h1 class="h1">Fake Playable Builder</h1>

    <section class="card">
      <h2 class="h2">Inputs</h2>

      <div class="field">
        <label class="label" for="titleInput">Title (sets &lt;title&gt;)</label>
        <input class="input" id="titleInput" type="text" placeholder="e.g. iKame Game | 250119_PAIH_iGCH_2Step" />
      </div>

      <div class="field">
        <label class="label" for="clickUrlInput">Click URL (sets linkDownload)</label>
        <input class="input" id="clickUrlInput" type="url" placeholder="https://play.google.com/store/apps/details?id=..." />
      </div>

      <div class="field">
        <div class="label">Video MP4 (drag & drop or choose)</div>
        <div id="dropZone" class="drop-zone" tabindex="0" role="button" aria-label="Drop MP4 here or click to choose">
          <div class="drop-zone__text">
            <div><strong>Drop MP4 here</strong> or click to choose</div>
            <div class="muted" id="fileMeta">No file selected</div>
          </div>
          <input id="fileInput" class="file-input" type="file" accept="video/mp4" />
        </div>
      </div>

      <div class="actions">
        <div id="status" class="status muted"></div>
      </div>

      <div class="note muted">
        Template source: <code>assets/templateHTML/Template.html</code>
      </div>
    </section>

    <section class="grid">
      <section class="card">
        <h2 class="h2">Preview</h2>
        <div class="muted" id="previewNote">Preview updates automatically after selecting an MP4.</div>
        <div id="runtimeStatus" class="runtime-status" aria-live="polite"></div>
        <iframe id="previewFrame" class="preview" allow="autoplay" title="Preview"></iframe>

        <div class="actions preview-controls" aria-label="Preview controls">
          <button id="playBtn" class="btn" type="button" disabled>Play</button>
          <button id="pauseBtn" class="btn btn--secondary" type="button" disabled>Pause</button>
          <button id="replayBtn" class="btn btn--secondary" type="button" disabled>Replay</button>
          <button id="prevFrameBtn" class="btn btn--secondary" type="button" disabled>Prev frame</button>
          <button id="nextFrameBtn" class="btn btn--secondary" type="button" disabled>Next frame</button>
        </div>

        <div class="timeline-wrap" aria-label="Timeline">
          <div id="timeline" class="timeline" role="button" tabindex="0" aria-label="Click to split or select a segment"></div>
          <div id="timelineMeta" class="muted timeline-meta"></div>
        </div>

        <div class="actions" aria-label="Export and popout preview">
          <button id="exportBtn" class="btn" type="button" disabled>Export single HTML</button>
          <button id="previewPopoutBtn" class="btn btn--secondary" type="button" disabled>Preview (New window)</button>
        </div>

        <video id="controlVideo" class="sr-only" muted playsinline></video>
      </section>

      <section class="card">
        <h2 class="h2">States</h2>
        <div class="muted">Click timeline segments to view/edit the state.</div>
        <div id="statesList" class="states"></div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="builder/app.js"></script>
</body>
</html>
